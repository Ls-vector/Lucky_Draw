<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sync Lucky Draw</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --accent: #44ffaa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 500px; text-align: center; background: #16213e; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .display-box { height: 160px; background: #0f3460; margin: 20px 0; border: 4px solid var(--primary); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #winner-name { font-size: 2.2rem; font-weight: bold; }
        #winner-award { font-size: 1.1rem; color: var(--accent); margin-top: 10px; }

        #draw-btn { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; }
        #draw-btn:disabled { background: #444; opacity: 0.5; }

        .admin-panel { display: none; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; text-align: left; }
        textarea { width: 100%; height: 70px; background: #0f3460; color: #fff; border: 1px solid #444; border-radius: 8px; margin: 5px 0 10px; padding: 10px; box-sizing: border-box; }
        
        .shuffling { animation: bounce 0.1s infinite; color: var(--primary); }
        @keyframes bounce { 50% { transform: translateY(-5px); } }
        
        .sync-status { font-size: 0.7rem; color: #44ffaa; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="sync-status">● Live Sync Active</div>
    <h1>LUCKY DRAW</h1>
    
    <div class="display-box" id="display">
        <div id="winner-name">Ready?</div>
        <div id="winner-award">Waiting for Draw...</div>
    </div>

    <button id="draw-btn" onclick="requestDraw()">TAP TO DRAW!</button>

    <div id="admin-controls" class="admin-panel">
        <h2 style="font-size: 1rem; color: var(--accent);">Admin Control (Laptop)</h2>
        
        <label>Participants</label>
        <textarea id="names-input" oninput="syncSettings()">John, Sarah, Mike</textarea>
        
        <label>Awards</label>
        <textarea id="awards-input" oninput="syncSettings()">Gold Medal, Silver Medal</textarea>
        
        <div style="background: #0f3460; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <p><input type="checkbox" id="remove-winner" onchange="syncSettings()" checked> Auto-remove winner</p>
            <p><input type="checkbox" id="is-trigger-device" onchange="toggleTriggerUI()"> <b>This is the Trigger Phone</b></p>
        </div>
        <button onclick="resetDraw()" style="background: #333; font-size: 0.9rem; padding: 10px;">Reset Screen for Everyone</button>
    </div>

    <p style="font-size: 0.7rem; color: #222; margin-top: 30px;" onclick="unlockAdmin()">Admin Menu</p>
</div>

<script>
    // --- PASTE YOUR FIREBASE CONFIG HERE ---
    const firebaseConfig = {
          apiKey: "AIzaSyBPyOSIy7tTLIpJME20Zz8et3fSFsFZnEs",
  authDomain: "luckydraw-9279e.firebaseapp.com",
  databaseURL: "https://luckydraw-9279e-default-rtdb.firebaseio.com",
  projectId: "luckydraw-9279e",
  storageBucket: "luckydraw-9279e.firebasestorage.app",
  messagingSenderId: "658856386719",
  appId: "1:658856386719:web:367f21ec05611b036202aa",
  measurementId: "G-SC7BND34RN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. ADMIN LOCK
    function unlockAdmin() {
        if (prompt("Enter Password:") === "1234") {
            document.getElementById('admin-controls').style.display = 'block';
        }
    }

    // 2. TRIGGER UI (One Phone Only)
    function toggleTriggerUI() {
        const isTrigger = document.getElementById('is-trigger-device').checked;
        document.getElementById('draw-btn').style.display = isTrigger ? 'block' : 'none';
    }

    // 3. AUTO-UPDATE SETTINGS (Laptop to Cloud)
    // Whenever you type on the laptop, it updates the cloud instantly
    function syncSettings() {
        db.ref('settings').set({
            names: document.getElementById('names-input').value,
            awards: document.getElementById('awards-input').value,
            removeWinner: document.getElementById('remove-winner').checked
        });
    }

    // 4. AUTO-REFRESH LISTENER (Cloud to Phones)
    // This keeps the names/awards list updated on the Trigger Phone automatically
    db.ref('settings').on('value', (snap) => {
        const s = snap.val();
        if (!s) return;
        document.getElementById('names-input').value = s.names;
        document.getElementById('awards-input').value = s.awards;
        document.getElementById('remove-winner').checked = s.removeWinner;
    });

    // 5. TRIGGER DRAW (Phone to Cloud)
    function requestDraw() {
        const names = document.getElementById('names-input').value.split(',').map(n => n.trim()).filter(n => n);
        const awards = document.getElementById('awards-input').value.split(',').map(n => n.trim()).filter(n => n);

        if (names.length === 0) return alert("No names left!");

        const winner = names[Math.floor(Math.random() * names.length)];
        const award = awards[Math.floor(Math.random() * awards.length)] || "Special Prize";

        db.ref('currentDraw').set({ state: 'drawing', winner: winner, award: award, t: Date.now() });

        if (document.getElementById('remove-winner').checked) {
            const updated = names.filter(n => n !== winner).join(', ');
            document.getElementById('names-input').value = updated;
            syncSettings(); // Update the cloud so the laptop sees the new list
        }
    }

    function resetDraw() {
        db.ref('currentDraw').set({ state: 'ready', t: Date.now() });
    }

    // 6. ANIMATION SYNC (Cloud to ALL Devices)
    db.ref('currentDraw').on('value', (snap) => {
        const data = snap.val();
        const nameEl = document.getElementById('winner-name');
        const awardEl = document.getElementById('winner-award');
        const display = document.getElementById('display');
        const btn = document.getElementById('draw-btn');

        if (!data || data.state === 'ready') {
            display.classList.remove('shuffling');
            nameEl.innerText = "Ready?";
            awardEl.innerText = "Waiting for Draw...";
            nameEl.style.color = "white";
            return;
        }

        btn.disabled = true;
        display.classList.add('shuffling');
        nameEl.innerText = "DRAWING...";
        awardEl.innerText = "Check your screens!";

        setTimeout(() => {
            display.classList.remove('shuffling');
            nameEl.innerText = "🏆 " + data.winner;
            awardEl.innerText = "WINNER: " + data.award;
            nameEl.style.color = "#44ffaa";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            btn.disabled = false;
        }, 3000);
    });
</script>
</body>
</html>
